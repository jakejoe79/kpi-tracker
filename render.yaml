services:
  # Backend API Service
  - type: web
    name: kpi-tracker-backend
    runtime: python
    plan: free
    root: backend
    buildCommand: pip install -r requirements.txt
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: kpi_tracker
      - key: ENV
        value: production
    healthCheckPath: /api/health

  # Frontend Static Site
  - type: web
    name: kpi-tracker-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && yarn install && yarn build
    staticPublishPath: ./frontend/build
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: REACT_APP_BACKEND_URL
        value: https://kpi-tracker-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
